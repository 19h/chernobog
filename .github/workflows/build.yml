name: Build Chernobog Plugin

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  IDA_SDK_REPO: HexRaysSA/ida-sdk
  # Match idax's reproducible IDA 9.4.0 release-patch SDK pin.
  IDA_SDK_STABLE_REF: 6929db6868a524496eb66e76e4ec6c9d720a0594
  XWIN_VERSION: 0.8.0

permissions:
  contents: read

jobs:
  validate-source:
    runs-on: ubuntu-latest
    name: Validate source tree

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Verify required build inputs
        shell: bash
        run: |
          set -euo pipefail
          required=(
            CMakeLists.txt
            CMakePresets.json
            cmake/build_provenance.hpp.in
            cmake/toolchains/windows-clang-msvc.cmake
            vendor/rax/Cargo.toml
          )
          for required_file in "${required[@]}"; do
            if [[ ! -f "$required_file" ]]; then
              echo "::error file=$required_file::Required build input is absent from the checkout"
              exit 1
            fi
          done
          git submodule status --recursive

  build:
    needs: validate-source
    strategy:
      fail-fast: false
      matrix:
        include:
          # IDA stable builds
          # Build x86_64 on the newer Apple Silicon image: Z3 4.16 uses
          # C++20 aggregate initialization that older Xcode images reject.
          - os: macos-latest
            name: macos-x86_64
            cmake_arch: x86_64
            rust_target: x86_64-apple-darwin
            ida_branch: ""
            ida_suffix: ""
          - os: macos-latest
            name: macos-arm64
            cmake_arch: arm64
            rust_target: aarch64-apple-darwin
            ida_branch: ""
            ida_suffix: ""
          - os: ubuntu-latest
            name: linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
            ida_branch: ""
            ida_suffix: ""
          - os: ubuntu-24.04-arm
            name: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            ida_branch: ""
            ida_suffix: ""
          - os: windows-11-arm
            name: windows-arm64
            cmake_arch: ARM64
            rust_target: aarch64-pc-windows-msvc
            ida_branch: ""
            ida_suffix: ""

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}${{ matrix.ida_suffix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add "${{ matrix.rust_target }}"
          cargo --version

      - name: Checkout IDA SDK (stable)
        if: matrix.ida_branch == ''
        uses: actions/checkout@v7
        with:
          repository: ${{ env.IDA_SDK_REPO }}
          ref: ${{ env.IDA_SDK_STABLE_REF }}
          path: ida-sdk
          submodules: recursive

      - name: Checkout IDA SDK (beta)
        if: matrix.ida_branch != ''
        uses: actions/checkout@v7
        with:
          repository: ${{ env.IDA_SDK_REPO }}
          ref: ${{ matrix.ida_branch }}
          path: ida-sdk
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ccache

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v ccache >/dev/null 2>&1; then
            brew install ccache
          fi

      - name: Cache build tree
        uses: actions/cache@v6
        with:
          path: build
          key: build-v3-${{ runner.os }}-${{ matrix.name }}-${{ env.IDA_SDK_STABLE_REF }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'ida-cmake/**', '.github/workflows/build.yml') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            build-v3-${{ runner.os }}-${{ matrix.name }}-${{ env.IDA_SDK_STABLE_REF }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'ida-cmake/**', '.github/workflows/build.yml') }}-

      - name: Cache ccache
        if: runner.os != 'Windows'
        uses: actions/cache@v6
        with:
          path: ~/.ccache
          key: ccache-v1-${{ runner.os }}-${{ matrix.name }}-${{ env.IDA_SDK_STABLE_REF }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'ida-cmake/**', 'src/**', '.github/workflows/build.yml') }}
          restore-keys: |
            ccache-v1-${{ runner.os }}-${{ matrix.name }}-${{ env.IDA_SDK_STABLE_REF }}-

      - name: Set environment variables (Unix)
        if: runner.os != 'Windows'
        run: |
          {
            printf '%s\n' "IDASDK=${{ github.workspace }}/ida-sdk"
            printf '%s\n' "CCACHE_DIR=${HOME}/.ccache"
            printf '%s\n' "CCACHE_BASEDIR=${{ github.workspace }}"
            printf '%s\n' "CCACHE_COMPRESS=true"
            printf '%s\n' "CCACHE_MAXSIZE=1G"
          } >> "$GITHUB_ENV"

      - name: Set environment variables (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "IDASDK=${{ github.workspace }}/ida-sdk" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          ccache --zero-stats || true
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.cmake_arch }}"

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          ccache --zero-stats || true
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Configure CMake (Windows ARM64)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -A "${{ matrix.cmake_arch }}" -DBUILD_TESTING=OFF

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          parallelism="$(nproc 2>/dev/null || sysctl -n hw.ncpu)"
          cmake --build build --config Release --parallel "$parallelism"

      - name: Build (Windows ARM64)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Show ccache stats
        if: runner.os != 'Windows'
        run: ccache --show-stats || true

      - name: Find built plugin (macOS)
        if: runner.os == 'macOS'
        id: find_plugin_macos
        run: |
          # GitHub SDK has src/ subdir, bootstrap.cmake adjusts IDASDK internally
          PLUGIN_FILE="${IDASDK}/src/bin/plugins/chernobog.dylib"
          if [ ! -f "$PLUGIN_FILE" ]; then
            echo "ERROR: Could not find built plugin at $PLUGIN_FILE"
            find . -name "chernobog*" -type f 2>/dev/null || true
            exit 1
          fi
          printf '%s\n' "plugin_file=$PLUGIN_FILE" >> "$GITHUB_OUTPUT"
          printf '%s\n' "extension=dylib" >> "$GITHUB_OUTPUT"

      - name: Find built plugin (Linux)
        if: runner.os == 'Linux'
        id: find_plugin_linux
        run: |
          # GitHub SDK has src/ subdir, bootstrap.cmake adjusts IDASDK internally
          PLUGIN_FILE="${IDASDK}/src/bin/plugins/chernobog.so"
          if [ ! -f "$PLUGIN_FILE" ]; then
            echo "ERROR: Could not find built plugin at $PLUGIN_FILE"
            find . -name "chernobog*" -type f 2>/dev/null || true
            exit 1
          fi
          case "${{ matrix.name }}" in
            linux-x86_64) expected_machine="Advanced Micro Devices X86-64" ;;
            linux-arm64) expected_machine="AArch64" ;;
            *) echo "ERROR: No ELF machine mapping for ${{ matrix.name }}"; exit 1 ;;
          esac
          actual_machine="$(readelf -h "$PLUGIN_FILE" | sed -n 's/^[[:space:]]*Machine:[[:space:]]*//p')"
          if [[ "$actual_machine" != "$expected_machine" ]]; then
            echo "ERROR: Built plugin ELF machine is '$actual_machine'; expected '$expected_machine'"
            exit 1
          fi
          printf '%s\n' "plugin_file=$PLUGIN_FILE" >> "$GITHUB_OUTPUT"
          printf '%s\n' "extension=so" >> "$GITHUB_OUTPUT"

      - name: Find built plugin (Windows ARM64)
        if: runner.os == 'Windows'
        id: find_plugin_windows_arm64
        shell: pwsh
        run: |
          $pluginFile = "$env:IDASDK/src/bin/plugins/chernobog.dll"
          if (-not (Test-Path -LiteralPath $pluginFile -PathType Leaf)) {
            Get-ChildItem -Path . -Recurse -Filter 'chernobog*' -File |
              ForEach-Object { $_.FullName }
            throw "Could not find built plugin at $pluginFile"
          }

          # IMAGE_FILE_MACHINE_ARM64 = 0xAA64. Verify the release artifact is
          # not an emulated or accidentally cross-selected x86-64 binary.
          $bytes = [System.IO.File]::ReadAllBytes($pluginFile)
          if ($bytes.Length -lt 64) {
            throw "Built plugin is too small to contain a PE header"
          }
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3c)
          if ($peOffset -lt 0 -or $peOffset + 6 -gt $bytes.Length) {
            throw "Built plugin has an invalid PE header offset"
          }
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          if ($machine -ne 0xAA64) {
            throw ('Built plugin PE machine is 0x{0:X4}; expected ARM64 (0xAA64)' -f $machine)
          }

          "plugin_file=$pluginFile" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "extension=dll" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp "${{ steps.find_plugin_macos.outputs.plugin_file }}" "artifacts/chernobog${{ matrix.ida_suffix }}_${{ matrix.name }}.${{ steps.find_plugin_macos.outputs.extension }}"

      - name: Prepare artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp "${{ steps.find_plugin_linux.outputs.plugin_file }}" "artifacts/chernobog${{ matrix.ida_suffix }}_${{ matrix.name }}.${{ steps.find_plugin_linux.outputs.extension }}"

      - name: Prepare artifact (Windows ARM64)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item -LiteralPath "${{ steps.find_plugin_windows_arm64.outputs.plugin_file }}" -Destination "artifacts/chernobog${{ matrix.ida_suffix }}_${{ matrix.name }}.${{ steps.find_plugin_windows_arm64.outputs.extension }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: chernobog${{ matrix.ida_suffix }}-${{ matrix.name }}
          path: artifacts/
          retention-days: 30

  build-windows-cross:
    needs: validate-source
    runs-on: ubuntu-latest
    name: Build windows-x86_64-clang

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
          cargo --version

      - name: Checkout IDA SDK (stable)
        uses: actions/checkout@v7
        with:
          repository: ${{ env.IDA_SDK_REPO }}
          ref: ${{ env.IDA_SDK_STABLE_REF }}
          path: ida-sdk
          submodules: recursive

      - name: Install dependencies
        run: |
          . /etc/os-release
          sudo apt-get update
          sudo apt-get install -y curl wget gpg ca-certificates ninja-build ccache
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y clang-20 lld-20 llvm-20 llvm-20-tools libclang-rt-20-dev

      - name: Prepare LLVM shims
        run: |
          python3 - <<'PY'
          import glob
          import os
          import stat
          import sys

          workspace = os.environ["GITHUB_WORKSPACE"]
          out_dir = os.path.join(workspace, ".ci-bin")
          os.makedirs(out_dir, exist_ok=True)

          def pick(*patterns):
              matches = []
              for pattern in patterns:
                  matches.extend(glob.glob(pattern))
              matches = sorted({m for m in matches if os.path.isfile(m) and os.access(m, os.X_OK)})
              return matches[-1] if matches else None

          clang = pick("/usr/bin/clang", "/usr/bin/clang-*", "/usr/lib/llvm-*/bin/clang")
          lld_link = pick("/usr/bin/lld-link", "/usr/bin/lld-link-*", "/usr/lib/llvm-*/bin/lld-link")
          ld_lld = pick("/usr/bin/ld.lld", "/usr/bin/ld.lld-*", "/usr/lib/llvm-*/bin/ld.lld")
          llvm_lib = pick("/usr/bin/llvm-lib", "/usr/bin/llvm-lib-*", "/usr/lib/llvm-*/bin/llvm-lib")
          llvm_rc = pick("/usr/bin/llvm-rc", "/usr/bin/llvm-rc-*", "/usr/lib/llvm-*/bin/llvm-rc")

          missing = []
          if not clang:
              missing.append("clang")
          if not lld_link and not ld_lld:
              missing.append("lld-link or ld.lld")
          if not llvm_lib:
              missing.append("llvm-lib")
          if not llvm_rc:
              missing.append("llvm-rc")

          if missing:
              raise SystemExit(f"Missing LLVM tools: {', '.join(missing)}")

          def write_wrapper(name, command):
              path = os.path.join(out_dir, name)
              with open(path, "w", encoding="ascii") as handle:
                  handle.write("#!/usr/bin/env bash\nset -euo pipefail\n")
                  handle.write(f"exec {command} \"$@\"\n")
              os.chmod(path, stat.S_IRUSR | stat.S_IWUSR | stat.S_IXUSR |
                            stat.S_IRGRP | stat.S_IXGRP |
                            stat.S_IROTH | stat.S_IXOTH)

          write_wrapper("clang-cl", f'"{clang}" --driver-mode=cl')
          write_wrapper("llvm-lib", f'"{llvm_lib}"')
          write_wrapper("llvm-rc", f'"{llvm_rc}"')
          if lld_link:
              write_wrapper("lld-link", f'"{lld_link}"')
          else:
              write_wrapper("lld-link", f'"{ld_lld}" -flavor link')

          print(f"Prepared LLVM shims in {out_dir}")
          print(f"  clang-cl -> {clang} --driver-mode=cl")
          print(f"  llvm-lib -> {llvm_lib}")
          print(f"  llvm-rc  -> {llvm_rc}")
          print(f"  lld-link -> {lld_link or (ld_lld + ' -flavor link')}")
          PY
          echo "${{ github.workspace }}/.ci-bin" >> "$GITHUB_PATH"

      - name: Install xwin
        run: |
          curl -fsSL "https://github.com/Jake-Shadle/xwin/releases/download/${{ env.XWIN_VERSION }}/xwin-${{ env.XWIN_VERSION }}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz
          sudo install -m 0755 "xwin-${{ env.XWIN_VERSION }}-x86_64-unknown-linux-musl/xwin" /usr/local/bin/xwin

      - name: Prepare xwin sysroot
        run: |
          xwin --accept-license --arch x86_64 splat --output "${{ github.workspace }}/xwin"

      - name: Cache build tree
        uses: actions/cache@v6
        with:
          path: out/build/windows-clang-release
          key: build-v3-linux-windows-clang-${{ env.IDA_SDK_STABLE_REF }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'ida-cmake/**', '.github/workflows/build.yml') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            build-v3-linux-windows-clang-${{ env.IDA_SDK_STABLE_REF }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'ida-cmake/**', '.github/workflows/build.yml') }}-

      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: ~/.ccache
          key: ccache-v1-linux-windows-clang-${{ env.IDA_SDK_STABLE_REF }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'ida-cmake/**', 'src/**', '.github/workflows/build.yml') }}
          restore-keys: |
            ccache-v1-linux-windows-clang-${{ env.IDA_SDK_STABLE_REF }}-

      - name: Set environment variables
        run: |
          {
            printf '%s\n' "IDASDK=${{ github.workspace }}/ida-sdk"
            printf '%s\n' "XWIN_ROOT=${{ github.workspace }}/xwin"
            printf '%s\n' "CCACHE_DIR=${HOME}/.ccache"
            printf '%s\n' "CCACHE_BASEDIR=${{ github.workspace }}"
            printf '%s\n' "CCACHE_COMPILERCHECK=content"
            printf '%s\n' "CCACHE_COMPRESS=true"
            printf '%s\n' "CCACHE_MAXSIZE=1G"
          } >> "$GITHUB_ENV"

      - name: Configure CMake (Windows cross)
        run: |
          ccache --zero-stats || true
          cmake --preset windows-clang-release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build (Windows cross)
        run: cmake --build --preset windows-clang-release --parallel "$(nproc)"

      - name: Show ccache stats
        run: ccache --show-stats || true

      - name: Find built plugin (Windows cross)
        id: find_plugin_windows_cross
        run: |
          PLUGIN_FILE="${IDASDK}/src/bin/plugins/chernobog.dll"
          if [ ! -f "$PLUGIN_FILE" ]; then
            echo "ERROR: Could not find built plugin at $PLUGIN_FILE"
            find . -name "chernobog*" -type f 2>/dev/null || true
            exit 1
          fi
          printf '%s\n' "plugin_file=$PLUGIN_FILE" >> "$GITHUB_OUTPUT"
          printf '%s\n' "extension=dll" >> "$GITHUB_OUTPUT"

      - name: Prepare artifact (Windows cross)
        run: |
          mkdir -p artifacts
          cp "${{ steps.find_plugin_windows_cross.outputs.plugin_file }}" "artifacts/chernobog_windows-x86_64-clang.${{ steps.find_plugin_windows_cross.outputs.extension }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: chernobog-windows-x86_64-clang
          path: artifacts/
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-windows-cross]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Copy all built plugin files
          find artifacts -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.dll" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
