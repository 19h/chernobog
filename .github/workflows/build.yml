name: Build Chernobog Plugin

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  IDA_SDK_REPO: HexRaysSA/ida-sdk
  # Pin CI to a reproducible 9.3 SDK tag instead of tracking ida-sdk/main.
  IDA_SDK_STABLE_REF: v9.3.0-sdk.2

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # IDA stable builds
          # Build x86_64 on the newer Apple Silicon image: Z3 4.16 uses
          # C++20 aggregate initialization that older Xcode images reject.
          - os: macos-latest
            name: macos-x86_64
            cmake_arch: x86_64
            ida_branch: ""
            ida_suffix: ""
          - os: macos-latest
            name: macos-arm64
            cmake_arch: arm64
            ida_branch: ""
            ida_suffix: ""
          - os: ubuntu-latest
            name: linux-x86_64
            ida_branch: ""
            ida_suffix: ""
          - os: windows-latest
            name: windows-x86_64
            cmake_arch: x64
            ida_branch: ""
            ida_suffix: ""

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}${{ matrix.ida_suffix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout IDA SDK (stable)
        if: matrix.ida_branch == ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IDA_SDK_REPO }}
          ref: ${{ env.IDA_SDK_STABLE_REF }}
          path: ida-sdk
          submodules: recursive

      - name: Checkout IDA SDK (beta)
        if: matrix.ida_branch != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IDA_SDK_REPO }}
          ref: ${{ matrix.ida_branch }}
          path: ida-sdk
          submodules: recursive

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.cmake_arch }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Set environment variables (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "IDASDK=${{ github.workspace }}/ida-sdk" >> $GITHUB_ENV

      - name: Set environment variables (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "IDASDK=${{ github.workspace }}/ida-sdk" >> $env:GITHUB_ENV

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_arch }}

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir build -Force
          cd build
          cmake .. -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }}

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build
          cmake --build . --config Release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cd build
          cmake --build . --config Release

      - name: Find built plugin (macOS)
        if: runner.os == 'macOS'
        id: find_plugin_macos
        run: |
          # GitHub SDK has src/ subdir, bootstrap.cmake adjusts IDASDK internally
          PLUGIN_FILE="${IDASDK}/src/bin/plugins/chernobog.dylib"
          if [ ! -f "$PLUGIN_FILE" ]; then
            echo "ERROR: Could not find built plugin at $PLUGIN_FILE"
            find . -name "chernobog*" -type f 2>/dev/null || true
            exit 1
          fi
          echo "plugin_file=$PLUGIN_FILE" >> $GITHUB_OUTPUT
          echo "extension=dylib" >> $GITHUB_OUTPUT

      - name: Find built plugin (Linux)
        if: runner.os == 'Linux'
        id: find_plugin_linux
        run: |
          # GitHub SDK has src/ subdir, bootstrap.cmake adjusts IDASDK internally
          PLUGIN_FILE="${IDASDK}/src/bin/plugins/chernobog.so"
          if [ ! -f "$PLUGIN_FILE" ]; then
            echo "ERROR: Could not find built plugin at $PLUGIN_FILE"
            find . -name "chernobog*" -type f 2>/dev/null || true
            exit 1
          fi
          echo "plugin_file=$PLUGIN_FILE" >> $GITHUB_OUTPUT
          echo "extension=so" >> $GITHUB_OUTPUT

      - name: Find built plugin (Windows)
        if: runner.os == 'Windows'
        id: find_plugin_windows
        shell: pwsh
        run: |
          # GitHub SDK has src/ subdir, bootstrap.cmake adjusts IDASDK internally
          $pluginFile = "$env:IDASDK/src/bin/plugins/chernobog.dll"

          if (-not (Test-Path $pluginFile)) {
            Write-Error "Could not find built plugin at $pluginFile"
            Get-ChildItem -Path . -Recurse -Filter "chernobog*" -ErrorAction SilentlyContinue
            exit 1
          }

          echo "plugin_file=$pluginFile" >> $env:GITHUB_OUTPUT
          echo "extension=dll" >> $env:GITHUB_OUTPUT
          Write-Host "Found plugin: $pluginFile"

      - name: Prepare artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp "${{ steps.find_plugin_macos.outputs.plugin_file }}" "artifacts/chernobog${{ matrix.ida_suffix }}_${{ matrix.name }}.${{ steps.find_plugin_macos.outputs.extension }}"

      - name: Prepare artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp "${{ steps.find_plugin_linux.outputs.plugin_file }}" "artifacts/chernobog${{ matrix.ida_suffix }}_${{ matrix.name }}.${{ steps.find_plugin_linux.outputs.extension }}"

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item "${{ steps.find_plugin_windows.outputs.plugin_file }}" "artifacts/chernobog${{ matrix.ida_suffix }}_${{ matrix.name }}.${{ steps.find_plugin_windows.outputs.extension }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chernobog${{ matrix.ida_suffix }}-${{ matrix.name }}
          path: artifacts/
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Copy all built plugin files
          find artifacts -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.dll" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
